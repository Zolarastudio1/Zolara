name: Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build
      env:
        VITE_SUPABASE_URL: https://ekvjnydomfresnkealpb.supabase.co
        VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ctUK9R-mIEuCFQnCR_8A4A_2L68Nutd

    - name: Deploy successful
      run: echo "✅ Build passed. Vercel is deploying automatically."
